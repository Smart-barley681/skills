name: Validate Skills

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # scripts use Python 3.10+ syntax (e.g. `int | None`)
          python-version: '3.11'

      - name: Validate skills
        run: python scripts/validate_skill.py skills
